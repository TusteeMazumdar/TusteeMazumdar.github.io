# Basic Site Settings
locale: "en-US"
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"

title: "Tustee Mazumdar"
title_separator: "-"

name: "Tustee Mazumdar"
description: "Tustee Mazumdar | Website"

url: "https://TusteeMazumdar.github.io"
baseurl: ""

repository: "TusteeMazumdar/TusteeMazumdar.github.io"

# Author Sidebar
author:
  avatar: "Prof_pic.jpg"
  name: "Tustee Mazumdar"
  pronouns: ""
  bio: "I am a self-motivated woman deeply focused on research. Especially in data engineering, NLP, Crisis informatics, opinion mining, and AI for Social good."
  location: "Chattogram, Bangladesh"
  uri: ""
  email: "tusteemazumdarcontact@gmail.com"

  # Academic Profiles
  googlescholar: "https://scholar.google.com/citations?user=h9GbRAoAAAAJ&hl=en"
  researchgate: "https://www.researchgate.net/profile/Tustee-Mazumdar"

  # Developer Profiles
  github: TusteeMazumdar

  # Social Media (username only where required)
  linkedin: tustee-mazumdar-740a58219

# Publication Categories
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"



# Site Settings
teaser: ""
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

comments:
  provider: false

# Staticman (optional)
staticman:
  allowedFields: ['name', 'email', 'url', 'message']
  branch: "gh-pages"
  commitMessage: "New comment."
  filename: comment-{@timestamp}
  format: "yml"
  moderation: true
  path: "_data/comments/{options.slug}"
  requiredFields: ['name', 'email', 'message']

atom_feed:
  hide: false

# SEO
google_site_verification: ""
bing_site_verification: ""

# Social Sharing
twitter:
  username: ""
facebook:
  username: ""
  app_id: ""

social:
  type: "Person"
  name: "Tustee Mazumdar"
  links: []

# Analytics
analytics:
  provider: false

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - node_modules
  - vendor
  - README

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown
markdown: kramdown
highlighter: rouge

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Permalink
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji
