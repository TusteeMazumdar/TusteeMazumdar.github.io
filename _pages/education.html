<h2>Honors and Awards</h2>

<div class="awards-modern">

{% for award in site.data.awards %}

  <div class="award-item">

    <div class="award-left">
      <strong>{{ award.title }}</strong><br>
      <span class="award-org">{{ award.organization }}</span>
    </div>

    {% if award.year %}
    <div class="award-year">
      {{ award.year }}
    </div>
    {% endif %}

  </div>

{% endfor %}

</div>
